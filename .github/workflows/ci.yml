name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Verify formatting
        run: test -z "$(gofmt -l .)"

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build linux amd64
        run: GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -ldflags "-s -w" -o dist/srne-inverter-to-mqtt_linux_amd64 ./cmd/srne-inverter-to-mqtt

      - name: Build linux arm64
        run: GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -ldflags "-s -w" -o dist/srne-inverter-to-mqtt_linux_arm64 ./cmd/srne-inverter-to-mqtt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: srne-inverter-to-mqtt-linux-builds
          path: dist/
